<!-- ===================================================================== -->
<!-- EqualReach AI chat bubble — paste into Webflow:                        -->
<!--   Project Settings → Custom Code → Footer Code  (shows site-wide)      -->
<!--                                                                        -->
<!-- Before publishing, set APP_URL below to your deployed Vercel URL.      -->
<!-- Matches the "EqualReach Chat Widget" design.                           -->
<!-- ===================================================================== -->
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

  @keyframes erSlideUp { from { opacity:0; transform:translateY(20px) scale(.97);} to { opacity:1; transform:translateY(0) scale(1);} }
  @keyframes erPulseRing { 0% { transform:scale(1); opacity:.55;} 100% { transform:scale(2); opacity:0;} }
  @keyframes erPillIn { from { opacity:0; transform:translateX(12px);} to { opacity:1; transform:translateX(0);} }

  #er-dock{position:fixed;bottom:24px;right:24px;z-index:2147483000;display:flex;align-items:center;gap:10px;font-family:'Inter',sans-serif}
  #er-pill{background:#fff;color:#04363A;font-size:13px;font-weight:600;padding:9px 16px;border-radius:100px;
    box-shadow:0 2px 16px rgba(0,0,0,.12);white-space:nowrap;border:1px solid #E2E8F0;cursor:pointer;
    animation:erPillIn .3s ease 1s both;user-select:none;transition:border-color .15s,color .15s}
  #er-pill:hover{border-color:#00C4CC;color:#00C4CC}
  #er-launcher-wrap{position:relative}
  #er-ring{position:absolute;inset:0;border-radius:50%;background:#00C4CC;animation:erPulseRing 2.5s ease-out infinite;pointer-events:none}
  #er-launcher{position:relative;z-index:1;width:56px;height:56px;border-radius:50%;background:#00C4CC;border:none;
    cursor:pointer;display:grid;place-items:center;box-shadow:0 4px 20px rgba(0,196,204,.5);transition:transform .18s,box-shadow .18s}
  #er-launcher:hover{transform:scale(1.08);box-shadow:0 6px 28px rgba(0,196,204,.6)}
  #er-launcher:active{transform:scale(.96)}
  #er-launcher svg{width:24px;height:24px;display:block}
  #er-panel{position:fixed;bottom:92px;right:24px;width:384px;max-width:calc(100vw - 32px);
    height:min(544px,calc(100vh - 112px));max-height:calc(100vh - 112px);background:#fff;border-radius:20px;
    box-shadow:0 24px 64px rgba(0,0,0,.15),0 0 0 1px rgba(0,0,0,.05);overflow:hidden;z-index:2147482999;
    display:none;animation:erSlideUp .22s cubic-bezier(.34,1.56,.64,1)}
  #er-panel.open{display:block}
  /* While the project draft is open, grow to a centered panel (NOT the whole
     screen) and dim the host page behind it, so the site stays visible around
     the drafter instead of being fully covered. */
  #er-backdrop{position:fixed;inset:0;background:rgba(15,23,42,.45);z-index:2147482998;display:none}
  #er-backdrop.show{display:block}
  #er-panel.expanded{top:50%;left:50%;transform:translate(-50%,-50%);bottom:auto;right:auto;
    width:min(1000px,calc(100vw - 48px));height:min(800px,calc(100vh - 48px));
    max-width:calc(100vw - 48px);max-height:calc(100vh - 48px);border-radius:20px}
  #er-panel iframe{width:100%;height:100%;border:0;display:block}
  @media(max-width:560px){#er-panel.expanded{width:calc(100vw - 16px);height:calc(100vh - 24px)}}
  @media(max-width:480px){#er-panel{right:8px;left:8px;width:auto;bottom:88px}}
</style>

<div id="er-dock">
  <div id="er-pill">Draft a project</div>
  <div id="er-launcher-wrap">
    <div id="er-ring"></div>
    <button id="er-launcher" aria-label="Open chat"></button>
  </div>
</div>
<div id="er-backdrop"></div>
<div id="er-panel">
  <iframe id="er-frame" title="EqualReach Project Drafter" loading="lazy"></iframe>
</div>

<script>
  (function () {
    var APP_URL = "https://er-project-drafter.vercel.app/?embed=1#/chat"; // ← your deployed URL

    var dock  = document.getElementById('er-dock');
    var pill  = document.getElementById('er-pill');
    var ring  = document.getElementById('er-ring');
    var btn   = document.getElementById('er-launcher');
    var panel = document.getElementById('er-panel');
    var frame = document.getElementById('er-frame');
    var backdrop = document.getElementById('er-backdrop');

    var SPARKLE = '<svg viewBox="0 0 24 24" fill="#fff"><path d="M12 2l2.35 6.5L21 10.8l-6.65 2.3L12 20l-2.35-6.9L3 10.8l6.65-2.3z"/></svg>';
    var CLOSE   = '<svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round"><path d="M6 6l12 12M18 6L6 18"/></svg>';

    function setOpen(open) {
      if (open && !frame.src) frame.src = APP_URL;   // lazy-load on first open
      panel.classList.toggle('open', open);
      btn.innerHTML = open ? CLOSE : SPARKLE;
      pill.style.display = open ? 'none' : '';
      ring.style.display = open ? 'none' : '';
      // Closing the whole widget also clears any expanded draft state.
      if (!open) { panel.classList.remove('expanded'); backdrop.classList.remove('show'); dock.style.display = ''; }
    }

    btn.addEventListener('click', function () { setOpen(!panel.classList.contains('open')); });
    pill.addEventListener('click', function () { setOpen(true); });

    // Messages from the chat iframe:
    //  er-chat-close → collapse the whole widget back to the bubble
    //  er-expand     → draft opened: grow to a centered panel + dim host page
    //  er-collapse   → draft closed: back to the floating popup
    //  er-navigate   → sign-up submitted: navigate the WHOLE tab to the app,
    //                  breaking out of the iframe (only to the EqualReach app).
    window.addEventListener('message', function (e) {
      if (!e || !e.data) return;
      if (e.data.type === 'er-chat-close') setOpen(false);
      if (e.data.type === 'er-expand') {
        panel.classList.add('expanded');
        backdrop.classList.add('show');
        dock.style.display = 'none';
      }
      if (e.data.type === 'er-collapse') {
        panel.classList.remove('expanded');
        backdrop.classList.remove('show');
        dock.style.display = '';
      }
      if (e.data.type === 'er-navigate' && typeof e.data.url === 'string' &&
          e.data.url.indexOf('https://app.equalreach.io/') === 0) {
        window.location.href = e.data.url;
      }
    });

    btn.innerHTML = SPARKLE;
  })();
</script>
